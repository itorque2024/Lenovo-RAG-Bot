services:
  # Lenovo Multi-Agent RAG API (Pure Python)
  - type: web
    name: lenovo-ai-backend
    env: python
    plan: free
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$PYTHONPATH:. uvicorn backend.server:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: INTERNAL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: RUN_TELEGRAM
        value: "true"
